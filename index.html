<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIT DEDP — Math Prep Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f5f0;--surface:#fff;--surface2:#f0ede6;--border:#e2ddd4;--border2:#ccc8be;
  --text:#1a1916;--text2:#6b6760;--text3:#9e9b95;
  --radius:10px;--radius-lg:16px;
  --p0:#2c3e50;--p0-bg:#eaecee;--p0-border:#bdc3c7;
  --p1:#1a4fd6;--p1-bg:#eef2fd;--p1-border:#b8cbf7;
  --p2:#1a7a4a;--p2-bg:#e8f5ee;--p2-border:#a3d9bc;
  --p3:#a05c00;--p3-bg:#fdf3e3;--p3-border:#f5c97a;
  --p4:#5c3aab;--p4-bg:#f0ebfc;--p4-border:#c9b8f0;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text)}
.app{display:grid;grid-template-columns:256px 1fr;height:100vh;overflow:hidden}
/* SIDEBAR */
.sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;overflow-y:auto}
.sidebar-header{padding:22px 18px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo{font-family:'DM Serif Display',serif;font-size:18px;line-height:1.2;margin-bottom:3px}
.tagline{font-size:10px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;font-family:'DM Mono',monospace}
.ring-wrap{padding:18px;display:flex;flex-direction:column;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
.ring-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-family:'DM Mono',monospace;margin-bottom:10px}
.ring-container{position:relative;width:80px;height:80px;margin-bottom:8px}
.ring-container svg{transform:rotate(-90deg)}
.ring-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-size:18px;font-weight:600}
.ring-sub{font-size:9px;color:var(--text3);font-family:'DM Mono',monospace}
.ring-stats{display:flex;gap:14px}
.rs-val{font-size:13px;font-weight:600;text-align:center}
.rs-key{font-size:9px;color:var(--text3);font-family:'DM Mono',monospace;text-align:center}
.nav{padding:8px;flex:1}
.nav-label{font-size:9.5px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-family:'DM Mono',monospace;padding:0 8px;margin-bottom:3px;margin-top:10px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius);cursor:pointer;transition:background .12s;user-select:none}
.nav-item:hover{background:var(--surface2)}
.nav-item.active{background:var(--text)}
.nav-item.active .nav-item-name{color:#fff}
.nav-item.active .nav-item-meta{color:rgba(255,255,255,.5)}
.nav-item.active .nav-mini-bar{background:rgba(255,255,255,.15)}
.nav-item.active .nav-mini-fill{background:rgba(255,255,255,.8)!important}
.nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.nav-item-text{flex:1;min-width:0}
.nav-item-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-item-meta{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace}
.nav-mini-bar{height:2px;background:var(--border);border-radius:2px;margin-top:3px;overflow:hidden}
.nav-mini-fill{height:100%;border-radius:2px;transition:width .4s}
.sidebar-footer{padding:12px;border-top:1px solid var(--border);flex-shrink:0}
.reset-btn{width:100%;padding:6px;font-size:11px;font-family:'DM Mono',monospace;color:var(--text3);background:none;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .12s}
.reset-btn:hover{border-color:var(--border2);color:var(--text2);background:var(--surface2)}
/* MAIN */
.main{height:100vh;overflow-y:auto}
.main-inner{max-width:800px;padding:32px 40px 60px}
/* HERO */
.phase-hero{margin-bottom:24px;padding-bottom:22px;border-bottom:1px solid var(--border)}
.phase-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px 3px 7px;border-radius:20px;font-size:10.5px;font-family:'DM Mono',monospace;margin-bottom:10px;border:1px solid}
.phase-badge .dot{width:5px;height:5px;border-radius:50%}
.phase-title{font-family:'DM Serif Display',serif;font-size:28px;line-height:1.2;margin-bottom:6px}
.phase-subtitle{font-size:13px;color:var(--text2);line-height:1.65;max-width:540px}
.phase-meta{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap}
.meta-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--text3);font-family:'DM Mono',monospace}
.meta-dot{width:3px;height:3px;border-radius:50%;background:var(--text3)}
/* PROGRESS */
.pb-wrap{margin-bottom:24px}
.pb-header{display:flex;justify-content:space-between;margin-bottom:6px}
.pb-label{font-size:11.5px;font-weight:500;color:var(--text2)}
.pb-pct{font-size:11.5px;font-family:'DM Mono',monospace;color:var(--text2)}
.pb-track{height:4px;background:var(--border);border-radius:3px;overflow:hidden}
.pb-fill{height:100%;border-radius:3px;transition:width .4s cubic-bezier(.4,0,.2,1)}
/* SECTION TITLE */
.sec-title{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--text3);font-family:'DM Mono',monospace;margin-bottom:12px;margin-top:26px}
/* TOPIC CARDS */
.topics-list{display:flex;flex-direction:column;gap:8px}
.topic-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:border-color .12s}
.topic-card:hover{border-color:var(--border2)}
.topic-header{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer}
.topic-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;font-family:'DM Serif Display',serif;font-weight:400}
.topic-info{flex:1;min-width:0}
.topic-name{font-size:13px;font-weight:500}
.topic-why{font-size:11px;color:var(--text3);margin-top:1px;line-height:1.4}
.topic-res{margin-top:4px;display:inline-flex;align-items:center;gap:3px}
.topic-res a{font-size:10.5px;color:var(--text3);text-decoration:none;font-family:'DM Mono',monospace;border-bottom:1px dashed var(--border2);padding-bottom:1px;transition:color .12s,border-color .12s;line-height:1}
.topic-res a:hover{color:var(--text);border-color:var(--text3)}
.topic-res svg{flex-shrink:0;color:var(--text3)}
.chk-count{font-size:10.5px;font-family:'DM Mono',monospace;color:var(--text3);flex-shrink:0}
.chevron{color:var(--text3);font-size:12px;transition:transform .2s;flex-shrink:0}
.topic-card.open .chevron{transform:rotate(180deg)}
.topic-items{padding:0 16px 13px;border-top:1px solid var(--border);display:none}
.topic-card.open .topic-items{display:block}
.checklist{list-style:none;padding-top:9px;display:flex;flex-direction:column;gap:4px}
.checklist-item label{display:flex;align-items:flex-start;gap:8px;cursor:pointer;width:100%}
.checklist-item input[type=checkbox]{width:14px;height:14px;margin-top:2px;flex-shrink:0;accent-color:var(--text);cursor:pointer}
.checklist-item span{font-size:12px;color:var(--text2);line-height:1.5;transition:color .12s}
.checklist-item input:checked+span{color:var(--text3);text-decoration:line-through}
/* WEEKLY */
.weekly-grid{display:flex;flex-direction:column;gap:4px}
.week-row{display:grid;grid-template-columns:95px 1fr 62px;align-items:center;gap:10px;padding:9px 13px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.week-row:hover{border-color:var(--border2)}
.wr-day{font-size:10px;font-family:'DM Mono',monospace;color:var(--text3);font-weight:500}
.wr-task{font-size:12px;color:var(--text2)}
.wr-hrs{font-size:10.5px;font-family:'DM Mono',monospace;color:var(--text3);text-align:right;white-space:nowrap}
/* TIP */
.tip-box{border-left:3px solid;padding:12px 15px;border-radius:0 var(--radius) var(--radius) 0;margin-top:20px;margin-bottom:40px}
.tip-box p{font-size:12px;line-height:1.7}
.tip-label{font-size:9.5px;font-family:'DM Mono',monospace;letter-spacing:.08em;text-transform:uppercase;font-weight:600;margin-bottom:3px}
/* ALERT */
.alert-box{border:1px solid;border-radius:var(--radius-lg);padding:14px 18px;margin-bottom:20px}
.al-title{font-size:12.5px;font-weight:600;margin-bottom:5px}
.al-body{font-size:12px;line-height:1.7}
/* OVERVIEW */
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px;margin-bottom:24px}
.ov-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all .15s}
.ov-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.ov-phase{font-size:9.5px;font-family:'DM Mono',monospace;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;font-weight:500}
.ov-name{font-size:13.5px;font-weight:600;margin-bottom:2px}
.ov-months{font-size:10px;color:var(--text3);margin-bottom:10px;font-family:'DM Mono',monospace}
.ov-bar{height:3px;border-radius:3px;background:var(--border);overflow:hidden;margin-bottom:5px}
.ov-fill{height:100%;border-radius:3px;transition:width .5s}
.ov-pct{font-size:10px;font-family:'DM Mono',monospace}
.tl-strip{display:flex;margin-bottom:24px;border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.tl-seg{flex:1;padding:11px 13px;cursor:pointer;transition:background .12s;border-right:1px solid var(--border)}
.tl-seg:last-child{border-right:none}
.tl-seg:hover{background:var(--surface2)}
.tl-seg.act{background:var(--text)}
.ts-mo{font-size:9.5px;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.ts-nm{font-size:12px;font-weight:500}
.tl-seg:not(.act) .ts-mo{color:var(--text3)}
.tl-seg:not(.act) .ts-nm{color:var(--text)}
.tl-seg.act .ts-mo{color:rgba(255,255,255,.5)}
.tl-seg.act .ts-nm{color:#fff}
.action-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 20px}
.action-box p{font-size:13px;color:var(--text2);line-height:1.8}
.action-box a{color:var(--text);border-bottom:1px solid var(--border2);text-decoration:none}
.action-box a:hover{border-color:var(--text)}
@media(max-width:760px){
  html,body{overflow:auto}
  .app{grid-template-columns:1fr;height:auto}
  .sidebar{height:auto;position:static}
  .main{height:auto;overflow:visible}
  .main-inner{padding:20px 16px 40px}
  .tl-strip{flex-direction:column}
  .tl-seg{border-right:none;border-bottom:1px solid var(--border)}
  .tl-seg:last-child{border-bottom:none}
}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo">DEDP Prep<br>Tracker</div>
    <div class="tagline">MIT · Jan 2027 Start</div>
  </div>
  <div class="ring-wrap">
    <div class="ring-label">Overall progress</div>
    <div class="ring-container">
      <svg width="80" height="80" viewBox="0 0 80 80">
        <circle cx="40" cy="40" r="33" fill="none" stroke="#e2ddd4" stroke-width="6"/>
        <circle cx="40" cy="40" r="33" fill="none" stroke="#1a1916" stroke-width="6" stroke-linecap="round"
          stroke-dasharray="207.3" stroke-dashoffset="207.3" id="ring-progress"/>
      </svg>
      <div class="ring-text"><span class="ring-pct" id="ring-pct">0%</span><span class="ring-sub">done</span></div>
    </div>
    <div class="ring-stats">
      <div><div class="rs-val" id="s-done">0</div><div class="rs-key">done</div></div>
      <div><div class="rs-val" id="s-total">0</div><div class="rs-key">total</div></div>
      <div><div class="rs-val" id="s-wks">42</div><div class="rs-key">weeks</div></div>
    </div>
  </div>
  <nav class="nav">
    <div class="nav-label">Navigate</div>
    <div class="nav-item active" onclick="showPage('overview')" id="nav-overview">
      <div class="nav-dot" style="background:#888"></div>
      <div class="nav-item-text">
        <div class="nav-item-name">Overview</div>
        <div class="nav-item-meta">All 5 phases</div>
      </div>
    </div>
    <div class="nav-label">Phases</div>
    <div id="sidebar-nav"></div>
  </nav>
  <div class="sidebar-footer">
    <button class="reset-btn" onclick="resetProgress()">↺ Reset all progress</button>
  </div>
</aside>
<main class="main">
  <div class="main-inner" id="main-content"></div>
</main>
</div>
<script>
const PHASES=[
{
  id:'p0',num:0,name:'Pre-Foundation',months:'Mar – Apr 2026',hrs:8,weeks:8,
  color:'#2c3e50',colorBg:'#eaecee',colorBorder:'#bdc3c7',
  subtitle:'10+ years away from math means starting here — not at calculus. This phase rebuilds arithmetic fluency, algebra confidence, and the number sense that everything else depends on.',
  alert:{title:'Why this phase exists for you',body:'MIT\'s own calculus course lists "high school algebra and trigonometry" as its only prerequisite. After a 10-year gap those muscles need rebuilding. This is your runway — 8 weeks that makes every subsequent phase faster and more effective.',color:'#2c3e50',bg:'#eaecee',border:'#bdc3c7'},
  topics:[
    {name:'Arithmetic & number sense',icon:'#',why:'The invisible foundation. Gaps here cause errors in every downstream calculation.',
     res:{label:'Khan Academy · Arithmetic',url:'https://www.khanacademy.org/math/arithmetic'},
     items:['Fractions: add, subtract, multiply, divide by hand','Percentages and ratios','Negative numbers and absolute value','Powers and roots: x², x³, √x, xⁿ','Order of operations (PEMDAS)','Scientific notation']},
    {name:'Algebra I — core mechanics',icon:'x',why:'Used in every DEDP equation — solving for unknowns in estimators, probability, and optimization.',
     res:{label:'Khan Academy · Algebra I',url:'https://www.khanacademy.org/math/algebra'},
     items:['Solving linear equations: 3x + 7 = 22','Solving systems of two equations','Inequalities: solving and graphing','Translating word problems into equations','Factoring: common factors, difference of squares, quadratics','The quadratic formula']},
    {name:'Algebra II — functions & graphs',icon:'f(x)',why:'Functions are the language of economics. Demand curves, utility, and regression lines are all functions.',
     res:{label:'Khan Academy · Algebra II',url:'https://www.khanacademy.org/math/algebra2'},
     items:['What a function is: domain, range, input → output','Graphing linear functions: slope and intercepts','Slope as rate of change — intuition behind derivatives','Quadratic functions and parabola shapes','Exponential functions: y = aˣ — growth and decay','Logarithms: ln(x) and log(x) — used constantly in econometrics']},
    {name:'Algebra III — expressions & notation',icon:'Σ',why:'Algebraic manipulation is the core skill in every DEDP derivation — you rearrange formulas constantly.',
     res:{label:'Khan Academy · Precalculus',url:'https://www.khanacademy.org/math/precalculus'},
     items:['Expanding brackets and simplifying expressions','Sigma notation (Σ): reading and evaluating sums','Manipulating fractions with variables','Completing the square','Reading mathematical notation in economics papers','Polynomial long division']},
    {name:'Geometry & trigonometry basics',icon:'△',why:'Light trig is needed for calculus prerequisites. Geometry builds spatial intuition for graphs.',
     res:{label:'Khan Academy · Trigonometry',url:'https://www.khanacademy.org/math/trigonometry'},
     items:['Coordinate plane: plotting points and distances','Slope between two points: (y₂−y₁)/(x₂−x₁)','Area and perimeter — useful for integration intuition','Sine, cosine, tangent — definitions and the unit circle','Key trig values: sin(0), sin(π/2), cos(0), cos(π)','Radian vs degree conversion']}
  ],
  weekly:[
    {day:'Mon',task:'Khan Academy lesson (1 topic) + 20 practice problems',hrs:'1.5 hrs'},
    {day:'Tue',task:'Rework incorrect problems from Monday by hand',hrs:'1 hr'},
    {day:'Wed',task:'New topic: functions or logs with graphing',hrs:'1.5 hrs'},
    {day:'Thu',task:'Mixed problem set combining the week\'s topics',hrs:'1.5 hrs'},
    {day:'Fri',task:'One Khan Academy unit test (timed)',hrs:'1 hr'},
    {day:'Weekend',task:'Review errors + work 1 chapter from Savov book',hrs:'1.5 hrs'}
  ],
  tip:'Do every Khan Academy problem by hand on paper — not in your head, not on a calculator. The physical act of writing algebraic steps rebuilds procedural memory that 10 years of disuse has dimmed. Speed comes later; accuracy and process come first.'
},
{
  id:'p1',num:1,name:'Calculus',months:'May – Jun 2026',hrs:10,weeks:8,
  color:'#1a4fd6',colorBg:'#eef2fd',colorBorder:'#b8cbf7',
  subtitle:'Build the mathematical bedrock before probability begins. With Phase 0 complete, this phase will feel manageable rather than overwhelming.',
  topics:[
    {name:'Limits & continuity',icon:'lim',why:'The conceptual foundation of calculus. Derivatives and integrals are both defined as limits.',
     res:{label:'MIT OCW 18.01SC · Limits',url:'https://ocw.mit.edu/courses/18-01sc-single-variable-calculus-fall-2010/pages/1.-differentiation/'},
     items:['Intuition of a limit: what a function approaches as x → a','One-sided limits and when limits do not exist','Limit laws: sum, product, quotient rules','Continuity: definition and why it matters','L\'Hôpital\'s rule for 0/0 and ∞/∞ forms','Limits at infinity — behavior as x → ∞']},
    {name:'Derivatives',icon:'d/dx',why:'Derivatives measure rates of change — the core of marginal analysis and optimization in economics.',
     res:{label:'3Blue1Brown · Essence of Calculus',url:'https://www.youtube.com/playlist?list=PLZHQObOWTQDMsr9K-rj53DwVRMYO3t5Yr'},
     items:['Definition as limit of a difference quotient','Power rule, constant rule, sum rule','Product rule and quotient rule','Chain rule — essential for composite functions','Derivatives of eˣ, ln(x), sin(x), cos(x)','Higher-order derivatives and economic interpretation']},
    {name:'Optimization',icon:'max',why:'Every economic model involves optimization — utility max, cost min, OLS minimizes squared residuals.',
     res:{label:'Khan Academy · AP Calculus AB',url:'https://www.khanacademy.org/math/ap-calculus-ab'},
     items:['Critical points: setting f\'(x) = 0 and solving','First derivative test: maxima and minima','Second derivative test: concavity and inflection points','Optimization on a closed interval','Partial derivatives: ∂f/∂x holding other variables fixed','Lagrangian: L = f(x,y) − λ(g(x,y)−c)']},
    {name:'Integration',icon:'∫',why:'Computes areas, cumulative probabilities (CDF from PDF), and expected values — all used in DEDP probability.',
     res:{label:'MIT OCW 18.01SC · Integration',url:'https://ocw.mit.edu/courses/18-01sc-single-variable-calculus-fall-2010/pages/3.-the-definite-integral-and-its-applications/'},
     items:['Antiderivatives and indefinite integrals','Fundamental Theorem of Calculus — parts I and II','Definite integrals as area under a curve','Integration by substitution (u-substitution)','Integration by parts: ∫u dv = uv − ∫v du','Improper integrals — needed for continuous probability distributions']},
    {name:'Multivariable calculus',icon:'∂²',why:'Multivariate regression and structural economic models require functions of multiple variables.',
     res:{label:'MIT OCW 18.02SC · Multivariable',url:'https://ocw.mit.edu/courses/18-02sc-multivariable-calculus-fall-2010/'},
     items:['Functions of two variables: z = f(x,y)','Partial derivatives: ∂f/∂x and ∂f/∂y','The gradient vector ∇f and its meaning','Total differential: df = (∂f/∂x)dx + (∂f/∂y)dy','Unconstrained optimization in two variables','Bordered Hessian for constrained optimization']},
    {name:'Linear algebra',icon:'Ax',why:'The backbone of OLS — every estimator is a matrix operation. β̂ = (X\'X)⁻¹X\'y is pure linear algebra.',
     res:{label:'3Blue1Brown · Essence of Linear Algebra',url:'https://www.youtube.com/playlist?list=PLZHQObOWTQDPD3MizzM2xVFitgF8hE_ab'},
     items:['Vectors: addition, scalar multiplication, dot product','Matrices: addition, multiplication, transposition','Determinants — 2×2 and 3×3 by hand','Matrix inverse: when it exists and how to find it','Solving linear systems with row reduction','Eigenvalues and eigenvectors — intuition and computation','Derive β̂ = (X\'X)⁻¹X\'y step by step from scratch']}
  ],
  weekly:[
    {day:'Mon / Tue',task:'New concept lecture (OCW or 3Blue1Brown) + notes',hrs:'2 hrs'},
    {day:'Wed / Thu',task:'Problem sets from Simon & Blume',hrs:'3 hrs'},
    {day:'Friday',task:'Review errors + rework weak problems by hand',hrs:'2 hrs'},
    {day:'Weekend',task:'Khan Academy practice + 1 applied economics example',hrs:'3 hrs'}
  ],
  tip:'Simon & Blume\'s Mathematics for Economists is the single best book for DEDP prep. Work every problem. The 3Blue1Brown videos are essential for visual intuition before drilling mechanics.'
},
{
  id:'p2',num:2,name:'Probability & Stats',months:'Jul – Aug 2026',hrs:12,weeks:8,
  color:'#1a7a4a',colorBg:'#e8f5ee',colorBorder:'#a3d9bc',
  subtitle:'Master probability theory and statistical inference to match the prerequisites of MIT 14.310x — the core DEDP data course taught by Esther Duflo.',
  topics:[
    {name:'Probability theory',icon:'P',why:'The entire first half of 14.310x is probability. Without this foundation, the course becomes extremely difficult.',
     res:{label:'MIT 6.431x · Probability (free audit)',url:'https://mitxonline.mit.edu/courses/course-v1:MITxT+6.431x/'},
     items:['Sample spaces, events, and axioms of probability','Complement, union, intersection — Venn diagram reasoning','Conditional probability: P(A|B) = P(A∩B)/P(B)','Bayes\' theorem — and why it matters for causal inference','Independence vs. correlation — a crucial distinction','Random variables: discrete and continuous','PMF, PDF, CDF — how to compute and interpret each','Expectation E[X], variance Var(X), standard deviation']},
    {name:'Joint distributions & key results',icon:'f(x,y)',why:'DEDP regression depends on understanding how variables relate probabilistically — covariance and joint behavior.',
     res:{label:'MIT OCW 6.041SC · Probability',url:'https://ocw.mit.edu/courses/6-041sc-probabilistic-systems-analysis-and-applied-probability-fall-2013/'},
     items:['Joint PMF and joint PDF — reading and computing','Marginal and conditional distributions','Covariance: Cov(X,Y) = E[XY] − E[X]E[Y]','Correlation coefficient ρ = Cov(X,Y)/(σ_X σ_Y)','Independence in terms of joint distributions','Law of Total Expectation: E[X] = E[E[X|Y]]','Law of Total Variance']},
    {name:'Special distributions',icon:'~',why:'DEDP uses Normal, Binomial, Poisson, and t-distributions throughout estimation and hypothesis testing.',
     res:{label:'StatQuest · Distributions playlist',url:'https://www.youtube.com/playlist?list=PLblh5JKOoLUK0FLuzwntyYI10UQFUhsY9'},

let S={};
function load(){
  try{const s=localStorage.getItem('dedp_v3');if(s)S=JSON.parse(s);}catch(e){}
  PHASES.forEach(ph=>ph.topics.forEach((t,ti)=>t.items.forEach((_,ii)=>{const k=`${ph.id}_${ti}_${ii}`;if(!(k in S))S[k]=false;})));
}
function save(){try{localStorage.setItem('dedp_v3',JSON.stringify(S));}catch(e){}}
function toggle(key){S[key]=!S[key];save();updateProgress();}
function resetProgress(){if(!confirm('Reset all progress?'))return;Object.keys(S).forEach(k=>S[k]=false);save();const p=document.querySelector('.nav-item.active')?.id?.replace('nav-','')??'overview';showPage(p);}
function phProg(ph){let d=0,t=0;ph.topics.forEach((tp,ti)=>tp.items.forEach((_,ii)=>{t++;if(S[`${ph.id}_${ti}_${ii}`])d++;}));return{d,t,pct:t?Math.round(d/t*100):0};}
function totProg(){let d=0,t=0;PHASES.forEach(ph=>{const p=phProg(ph);d+=p.d;t+=p.t;});return{d,t,pct:t?Math.round(d/t*100):0};}
function updateProgress(){
  const tot=totProg();
  const circ=207.3,off=circ-(tot.pct/100)*circ;
  const ring=document.getElementById('ring-progress');if(ring)ring.setAttribute('stroke-dashoffset',off.toFixed(1));
  const rp=document.getElementById('ring-pct');if(rp)rp.textContent=tot.pct+'%';
  const sd=document.getElementById('s-done');if(sd)sd.textContent=tot.d;
  const st=document.getElementById('s-total');if(st)st.textContent=tot.t;
  PHASES.forEach(ph=>{
    const p=phProg(ph);
    const nb=document.getElementById(`nb-${ph.id}`);if(nb)nb.style.width=p.pct+'%';
    const nm=document.getElementById(`nm-${ph.id}`);if(nm)nm.textContent=p.pct+'% · '+ph.months.split(' ')[0];
    const pb=document.getElementById(`pb-${ph.id}`);if(pb)pb.style.width=p.pct+'%';
    const pp=document.getElementById(`pp-${ph.id}`);if(pp)pp.textContent=p.pct+'%';
    const of=document.getElementById(`of-${ph.id}`);if(of)of.style.width=p.pct+'%';
    const op=document.getElementById(`op-${ph.id}`);if(op){op.textContent=p.pct+'% complete';op.style.color=ph.color;}
  });
  document.querySelectorAll('.chk-count').forEach(el=>{
    const[phId,ti]=el.dataset.key.split('_');
    const ph=PHASES.find(p=>p.id===phId);if(!ph)return;
    const tp=ph.topics[+ti];let d=0;
    tp.items.forEach((_,ii)=>{if(S[`${phId}_${ti}_${ii}`])d++;});
    el.textContent=d+'/'+tp.items.length;
  });
}
function buildNav(){
  document.getElementById('sidebar-nav').innerHTML=PHASES.map(ph=>`
    <div class="nav-item" onclick="showPage('${ph.id}')" id="nav-${ph.id}">
      <div class="nav-dot" style="background:${ph.color}"></div>
      <div class="nav-item-text">
        <div class="nav-item-name">Phase ${ph.num}: ${ph.name}</div>
        <div class="nav-item-meta" id="nm-${ph.id}">0% · ${ph.months.split(' ')[0]}</div>
        <div class="nav-mini-bar"><div class="nav-mini-fill" id="nb-${ph.id}" style="background:${ph.color};width:0%"></div></div>
      </div>
    </div>`).join('');
}
function showPage(id){
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const n=document.getElementById('nav-'+id);if(n)n.classList.add('active');
  const cont=document.getElementById('main-content');
  id==='overview'?renderOverview(cont):renderPhase(cont,PHASES.find(p=>p.id===id));
  updateProgress();
  try{document.querySelector('.main').scrollTop=0;}catch(e){}
}

    </div>`;
}

  const p=phProg(ph);
  cont.innerHTML=`

      <div class="phase-badge" style="background:${ph.colorBg};border-color:${ph.colorBorder};color:${ph.color}">
        <div class="dot" style="background:${ph.color}"></div>Phase ${ph.num} · ${ph.months}
      </div>

    <div class="sec-title">Topics — click ↗ to open resource directly</div>
    <div class="topics-list">
      ${ph.topics.map((t,ti)=>{

        return`<div class="topic-card" id="tc-${ph.id}-${ti}">
          <div class="topic-header" onclick="toggleCard('${ph.id}','${ti}')">

load();buildNav();showPage('overview');
